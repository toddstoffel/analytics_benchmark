[lightning]
level = "info"
file = "tidb-lightning.log"
max-error = 0
meta-schema-name = "lightning_metadata"
table-concurrency = 16                     # Increased for parallel table imports
index-concurrency = 8                      # Raised for faster index creation
region-concurrency = 8                     # Adjusted for better region processing
io-concurrency = 8                         # Boosted I/O operations for speed

[tikv-importer]
backend = "local"
sorted-kv-dir = "/tmp/tidb_sort"           # Updated to use faster disk storage
parallel-import = true                     # Ensures parallel imports for better performance

[mydumper]
data-source-dir = "../s3"
batch-import-ratio = 1.2                   # Slightly increased for larger import batches
read-block-size = 4194304                  # Increased to 4 MiB for better block reading efficiency

[mydumper.csv]
separator = ','
delimiter = '"'
terminator = ''
header = false
not-null = false
null = '\N'
backslash-escape = true
trim-last-separator = false

[tidb]
host = "127.0.0.1"
port = 4000
user = "root"
password = ""
status-port = 10080
pd-addr = "127.0.0.1:2379"
log-level = "error"
build-stats-concurrency = 80               # Boosted for faster stats building
distsql-scan-concurrency = 400             # Increased for efficient distributed scans
index-serial-scan-concurrency = 80         # Raised to handle high indexing workloads
checksum-table-concurrency = 80            # Improved for faster table checksum computation

[checkpoint]
enable = true
keep-after-success = false
schema = "tidb_lightning_checkpoint"
