services:

  pm1:
    image: mariadb/columnstore:latest
    shm_size: '512mb'
    hostname: mcs1
    container_name: mcs1
    volumes:
      - data1:/var/lib/columnstore/data1
      - storagemanager:/var/lib/columnstore/storagemanager
      - ../s3:/s3
    environment:
      PM1: mcs1
    ports:
      - 3306:3306

volumes:
  data1:
  storagemanager: